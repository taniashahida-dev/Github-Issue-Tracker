<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

<!-- DaysiUI and Tailwind link -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Google font  -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- csslink -->
 <link rel="stylesheet" href="./tailwind.css">
 
</head>
<body class="bg-gray-100">
    
<header>
    <div class="navbar bg-base-100 shadow-sm justify-between">
  <div class="flex gap-2 items-center justify-center">
     <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
    <p class=" text-2xl font-bold">GitHub Issues Tracker</p>
  </div>
<div class="join">
  <div>
   <div class="join">
  <div>
    <label class="input validator join-item">
      <input type="text" placeholder="Search issues" />
    </label>
  </div>
  <button class="btn btn-primary join-item text-white">+New issue</button>
</div>
</div>
</header>
<main class="w-10/12 mx-auto ">
  <section class="gap-10  mt-24 p-4 shadow-sm shadow-gray-400  bg-white">
    <button class="btn px-8 btn-primary">All</button>
    <button class="btn px-8 ">Open</button>
    <button class="btn px-8 ">Close</button>
  </section>

<section>
  <div class="flex justify-between bg-white shadow-sm shadow-gray-400 p-4 items-center mt-4">
    <div class="flex justify-between gap-5 ">
      <img class="w-14 border border-[#4A00FF] rounded-full" src="./assets/Aperture.png" alt="">
      <div class="">
        <h1 class="text-3xl font-bold">50 Issues</h1>
        <p class="text-gray-600 w-4xl">Track and manage your project issues</p>
      </div>
    </div>
    <div class="flex gap-2">
<div>
  <p><span class="inline-block w-3 h-3 bg-green-500 rounded-full"> </span> Open</p>
</div>
<div>
  <p><span class="inline-block w-3 h-3 bg-purple-500 rounded-full"> </span> Closed</p>
</div>
    </div>
  </div>



  <div class="bg-gray-50 p-2 grid grid-cols-4" id="issue-container">
     


  </div>
</section>

</main>



    <script src="./script.js"></script>
</body>
</html>
