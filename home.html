<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

<!-- DaysiUI and Tailwind link -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Google font  -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font Awsome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


<!-- csslink -->
 <link rel="stylesheet" href="./tailwind.css">
 
</head>
<body class="bg-gray-100">
    
<header>
    <div class="navbar bg-base-100 shadow-sm flex-col  space-y-1 md:flex-row justify-between">
  <div class="flex gap-2 items-center justify-center ">
     <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
    <p class="text-lg md:text-2xl font-bold">GitHub Issues Tracker</p>
  </div>
<div class="join">
  <div>
   <div class="join">
  <div>
    <label class="input validator join-item">
      <input id="input-text" type="text" placeholder="Search issues" />
    </label>
  </div>
  <button id="input-search" class="btn btn-primary join-item text-white">Search</button>
</div>
</div>
</header>
<main class="w-10/12 mx-auto ">
  <section class="gap-10  mt-24 p-2 md:p-4 shadow-sm shadow-gray-400  bg-white">
     <button  id="all-btn"  class="btn px-8 btn-primary">All</button>
    <button  id="open-btn" class="btn px-8 ">Open</button>
    <button  id="close-btn" class="btn px-8 ">Close</button>
  </section>

<section>
  <div class="flex flex-col lg:flex-row lg:justify-between bg-white shadow-sm shadow-gray-400 p-4 items-center mt-4 ">
    <div class="flex justify-between gap-2 items-center ">
      <img class="w-11 h-11 border border-[#4A00FF] rounded-full" src="./assets/Aperture.png" alt="">
      <div class="">
        <h1 id="issue-count" class="text-3xl font-bold">0 Issues</h1>
        <p class="text-gray-600 w-4xl">Track and manage your project issues</p>
      </div>
    </div>
    <div class="flex gap-2">
<div>
  <p><span class="inline-block w-3 h-3 bg-green-500 rounded-full"> </span> Open</p>
</div>
<div>
  <p><span class="inline-block w-3 h-3 bg-purple-500 rounded-full"> </span> Closed</p>
</div>
    </div>
  </div>

 <!-- modal -->
<dialog id="modal" class="modal modal-bottom sm:modal-middle">
  <div  class="modal-box">
    <div id="modal-container" >
 
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
<section class="bg-gray-50 p-2  grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2" id="issue-container">

</section>
  <div class="flex items-center justify-center mt-4"><span id="spinner" class="loading loading-dots loading-xl hidden"></span></div>
</section>
</main>
    <script src="./home.js"></script>
</body>
</html>
